# Configuraci\u00c3\u00b3n de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sanicen_bd
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraci\u00c3\u00b3n de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Configuraci\u00c3\u00b3n del servidor
server.port=8080

# Configuraci\u00c3\u00b3n de JWT
jwt.secret=ClinicaSanicenSecretKey2024UltraSecureKeyForJWTTokenGenerationChangeInProduction
jwt.expiration=86400000 

# Configuraci\u00c3\u00b3n de logging
logging.level.root=INFO
logging.level.com.utp.clinicasanicen_be=DEBUG
logging.file.name=logs/clinicasanicen.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

